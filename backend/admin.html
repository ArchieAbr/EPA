<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Admin — Live Activity</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --green: #22c55e;
        --amber: #f59e0b;
        --red: #ef4444;
        --purple: #a78bfa;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
        font-size: 13px;
        line-height: 1.5;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
        color: var(--accent);
      }
      header h1 span {
        color: var(--muted);
        font-weight: 400;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Stats cards ── */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }
      .stat-card .label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-card .value {
        font-size: 28px;
        font-weight: 700;
        margin-top: 4px;
      }
      .stat-card.active .value {
        color: var(--green);
      }
      .stat-card.decom .value {
        color: var(--red);
      }
      .stat-card.wo .value {
        color: var(--accent);
      }
      .stat-card.audit .value {
        color: var(--purple);
      }

      /* ── Activity table ── */
      .table-wrapper {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .table-header h2 {
        font-size: 14px;
        font-weight: 600;
      }
      .table-header .refresh-info {
        color: var(--muted);
        font-size: 11px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        text-align: left;
        padding: 10px 16px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
      }
      tbody td {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      tbody tr {
        transition: background 0.2s;
      }
      tbody tr:hover {
        background: rgba(56, 189, 248, 0.05);
      }
      tbody tr.new-row {
        animation: highlight 2s ease-out;
      }
      @keyframes highlight {
        from {
          background: rgba(34, 197, 94, 0.15);
        }
        to {
          background: transparent;
        }
      }

      /* ── Action badges ── */
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge.CREATE {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .badge.ACCEPT {
        background: rgba(56, 189, 248, 0.15);
        color: var(--accent);
      }
      .badge.UPDATE {
        background: rgba(245, 158, 11, 0.15);
        color: var(--amber);
      }
      .badge.DELETE {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }

      .asset-id {
        color: var(--accent);
      }
      .timestamp {
        color: var(--muted);
        font-size: 12px;
      }
      .empty-state {
        text-align: center;
        padding: 40px 16px;
        color: var(--muted);
      }

      .scroll-area {
        max-height: 60vh;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⚡ GIS Activity Monitor <span>— Live Database Feed</span></h1>
      <div class="status-bar">
        <div class="status-dot"></div>
        <span id="poll-status">Polling every 2s</span>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card active">
        <div class="label">Active Assets</div>
        <div class="value" id="stat-active">—</div>
      </div>
      <div class="stat-card decom">
        <div class="label">Decommissioned</div>
        <div class="value" id="stat-decom">—</div>
      </div>
      <div class="stat-card wo">
        <div class="label">Work Orders</div>
        <div class="value" id="stat-wo">—</div>
      </div>
      <div class="stat-card audit">
        <div class="label">Total Audit Entries</div>
        <div class="value" id="stat-audit">—</div>
      </div>
    </div>

    <div class="table-wrapper">
      <div class="table-header">
        <h2>Recent Activity</h2>
        <span class="refresh-info" id="last-refresh">—</span>
      </div>
      <div class="scroll-area">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Time</th>
              <th>Action</th>
              <th>Asset ID</th>
              <th>Type</th>
              <th>Work Order</th>
            </tr>
          </thead>
          <tbody id="activity-body">
            <tr>
              <td colspan="6" class="empty-state">Waiting for data…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const API = "http://127.0.0.1:5000/api/activity";
      const POLL_MS = 2000;
      let lastMaxId = 0;

      function formatTime(iso) {
        const d = new Date(iso);
        return (
          d.toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          }) +
          "." +
          String(d.getMilliseconds()).padStart(3, "0")
        );
      }

      async function poll() {
        try {
          const res = await fetch(API);
          if (!res.ok) throw new Error(res.status);
          const data = await res.json();

          // Stats
          document.getElementById("stat-active").textContent =
            data.stats.active_assets;
          document.getElementById("stat-decom").textContent =
            data.stats.decommissioned_assets;
          document.getElementById("stat-wo").textContent =
            data.stats.work_orders;
          document.getElementById("stat-audit").textContent =
            data.stats.total_audit_entries;

          // Table
          const tbody = document.getElementById("activity-body");
          if (data.recent.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="6" class="empty-state">No activity yet — sync some assets!</td></tr>';
          } else {
            const newMaxId = data.recent[0]?.id || 0;
            tbody.innerHTML = data.recent
              .map((r) => {
                const isNew = r.id > lastMaxId && lastMaxId > 0;
                return `<tr class="${isNew ? "new-row" : ""}">
            <td>${r.id}</td>
            <td class="timestamp">${formatTime(r.created_at)}</td>
            <td><span class="badge ${r.action}">${r.action}</span></td>
            <td class="asset-id">${r.asset_id}</td>
            <td>${r.asset_type}</td>
            <td>${r.work_order_id || "—"}</td>
          </tr>`;
              })
              .join("");
            lastMaxId = newMaxId;
          }

          document.getElementById("last-refresh").textContent =
            "Updated " + new Date().toLocaleTimeString("en-GB");
          document.getElementById("poll-status").textContent =
            "Polling every 2s";
          document.querySelector(".status-dot").style.background =
            "var(--green)";
        } catch (err) {
          document.getElementById("poll-status").textContent =
            "Connection lost — retrying…";
          document.querySelector(".status-dot").style.background = "var(--red)";
        }
      }

      poll();
      setInterval(poll, POLL_MS);
    </script>
  </body>
</html>
