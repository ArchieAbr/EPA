<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline GIS Asset Capture</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <div
          class="menu-group"
          style="background: #233342; border-bottom: 1px solid #1a252f"
        >
          <div class="menu-title" style="color: #3498db">ACTIVE JOB PACK</div>
          <h2 style="margin: 0; font-size: 1.1rem; color: white">
            WR-2025-9901
          </h2>
          <p style="font-size: 0.85rem; color: #bdc3c7; margin: 5px 0 15px 0">
            Woodhouse Moor Circuit<br />
            <span style="color: #f1c40f">● In Progress</span>
          </p>
        </div>

        <div class="menu-group">
          <div class="menu-title">Construction Tools</div>

          <button class="tool-btn" onclick="toggleSubmenu('point-tools')">
            Add Point Asset <span>▼</span>
          </button>
          <div id="point-tools" class="submenu">
            <button class="submenu-btn" onclick="activateTool('Pole')">
              Add Pole
            </button>
            <button class="submenu-btn" onclick="activateTool('Transformer')">
              Add Transformer
            </button>
          </div>

          <button class="tool-btn" onclick="activateTool('Cable')">
            Add Cable Route
          </button>
        </div>

        <div class="menu-group">
          <div class="menu-title">Actions</div>
          <button class="tool-btn" onclick="syncOfflineChanges()">
            Force Sync
          </button>
        </div>
      </aside>

      <main class="map-wrapper">
        <div id="status" class="checking">Checking...</div>
        <div id="map"></div>
      </main>
    </div>

    <!-- ASSET DATA FORM MODAL -->
    <div id="asset-modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">New Pole</h3>
          <button class="modal-close" onclick="closeAssetModal()">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="asset-form">
            <!-- Form content injected dynamically from forms.js -->
            <div id="form-fields-container"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" onclick="closeAssetModal()">
            Cancel
          </button>
          <button class="btn btn-save" onclick="saveAssetForm()">
            Save Asset
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

    <script src="forms.js"></script>
    <script src="app.js"></script>

    <script>
      // Only keep the UI toggle logic here
      function toggleSubmenu(id) {
        const el = document.getElementById(id);
        if (el.style.display === "block") {
          el.style.display = "none";
        } else {
          el.style.display = "block";
        }
      }
      // NOTE TO SELF: activateTool() has been removed from here.
    </script>
  </body>
</html>
