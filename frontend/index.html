<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline GIS Asset Capture</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <!-- WORK ORDER INFO (Dynamic) -->
        <div
          id="wo-info-panel"
          class="menu-group"
          style="background: #233342; border-bottom: 1px solid #1a252f"
        >
          <div class="menu-title" style="color: #3498db">ACTIVE JOB PACK</div>
          <div id="wo-details">
            <p style="color: #7f8c8d; font-size: 0.9rem">
              No work order selected
            </p>
            <button
              class="tool-btn"
              onclick="openWorkOrderSelector()"
              style="margin-top: 10px"
            >
              Select Work Order
            </button>
          </div>
        </div>

        <!-- CONSTRUCTION TOOLS (Hidden until W/O selected) -->
        <div id="tools-panel" class="menu-group" style="display: none">
          <div class="menu-title">Construction Tools</div>

          <button class="tool-btn" onclick="toggleSubmenu('point-tools')">
            Add Point Asset <span>▼</span>
          </button>
          <div id="point-tools" class="submenu">
            <button class="submenu-btn" onclick="activateTool('Pole')">
              Add Pole
            </button>
            <button class="submenu-btn" onclick="activateTool('Transformer')">
              Add Transformer
            </button>
          </div>

          <button class="tool-btn" onclick="activateTool('Cable')">
            Add Cable Route
          </button>
        </div>

        <!-- ACTIONS -->
        <div id="actions-panel" class="menu-group" style="display: none">
          <div class="menu-title">Developer Tools</div>
          <button class="tool-btn" onclick="syncOfflineChanges()">
            Force Sync
          </button>
          <button
            class="tool-btn"
            onclick="clearLocalData()"
            style="color: #e74c3c"
          >
            Clear Local Data
          </button>
        </div>
      </aside>

      <main class="map-wrapper">
        <div id="status" class="checking">Checking...</div>
        <div
          id="sync-badge"
          class="sync-badge"
          style="display: none"
          onclick="syncOfflineChanges()"
        >
          0 pending
        </div>
        <div id="map"></div>
      </main>
    </div>

    <!-- ASSET DATA FORM MODAL -->
    <div id="asset-modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">New Pole</h3>
          <button class="modal-close" onclick="closeAssetModal()">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form
            id="asset-form"
            action="javascript:void(0);"
            onsubmit="return false;"
            novalidate
          >
            <!-- Form content injected dynamically from forms.js -->
            <div id="form-fields-container"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-cancel"
            onclick="closeAssetModal()"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-save"
            onclick="return saveAssetForm(event);"
          >
            Save Asset
          </button>
        </div>
      </div>
    </div>

    <!-- WORK ORDER SELECTOR MODAL -->
    <div id="wo-selector-modal" class="modal-overlay">
      <div class="modal" style="width: 500px">
        <div class="modal-header">
          <h3>Select Work Order</h3>
          <button class="modal-close" onclick="closeWorkOrderSelector()">
            &times;
          </button>
        </div>
        <div class="modal-body" style="padding: 0">
          <div id="wo-list-container">
            <div class="wo-loading">Loading work orders...</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
    <script src="state.js"></script>
    <script src="db.js"></script>
    <script src="api.js"></script>
    <script src="map.js"></script>
    <script src="forms.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
    <script src="../tests/system-checks.js"></script>

    <script>
      // UI toggle & service worker registration
      function toggleSubmenu(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
      }

      // Register service worker for offline support
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").then(
          (reg) => console.log("[SW] Registered:", reg.scope),
          (err) => console.warn("[SW] Registration failed:", err),
        );
      }
    </script>
  </body>
</html>
